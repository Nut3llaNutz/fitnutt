<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>FitNutt</title>
    <meta name="description" content="Track your macros, meals and supplements for a successful cut or bulk. Mobile-first PWA built for gains." />
    <meta name="theme-color" content="#EA5C1F" />
    <link rel="icon" href="/fitnutt-logo.png" />
    <link rel="apple-touch-icon" href="/fitnutt-logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitNutt" />
    <link rel="preload" as="image" href="/fitnutt-logo.png" />
    <link rel="preload" as="image" href="/fitnutt-logo-down.png" />

    <meta property="og:title" content="FitNutt" />
    <meta property="og:description" content="Track your macros, meals and supplements for a successful cut or bulk. Mobile-first PWA built for gains." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/fitnutt-logo.png" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FitNutt" />
    <meta name="twitter:description" content="Track your macros, meals and supplements for a successful cut or bulk. Mobile-first PWA built for gains." />
    <meta name="twitter:image" content="/fitnutt-logo.png" />
    <style>
      body { margin: 0; }
      #root-preloader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease-out, visibility 0.6s; background-color: inherit; }
      #root-preloader.fade-out { opacity: 0; visibility: hidden; }
      .pre-logo { position: relative; height: 6rem; width: 6rem; margin-bottom: 1rem; }
      .pre-logo img { position: absolute; inset: 0; height: 100%; width: 100%; }
      .pre-logo img:nth-child(1) { animation: pre-pump-up 1s infinite; }
      .pre-logo img:nth-child(2) { animation: pre-pump-down 1s infinite; }
      .pre-text { font-size: 1.5rem; font-weight: 700; animation: pre-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; font-family: sans-serif; }
      .dark .pre-text { color: white; }
      html:not(.dark) .pre-text { color: #20242e; }
      .pre-content { opacity: 0; animation: pre-fade-in 0.6s ease-out forwards; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      @keyframes pre-fade-in { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes pre-pump-up { 0%, 49.9% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes pre-pump-down { 0%, 49.9% { opacity: 0; } 50%, 100% { opacity: 1; } }
      @keyframes pre-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
    <script>
      /* Instantly apply theme to HTML before CSS/React to prevent white flash 'glitch' */
      (function() {
        try {
          var theme = localStorage.getItem("vite-ui-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = 'hsl(0, 0%, 10.6%)'; /* matches dark var(--background) */
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = 'hsl(0, 0%, 96.1%)'; /* matches light var(--background) */
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- App Shell Preloader: Renders instantly on network request above the React root -->
    <div id="root-preloader">
      <div class="pre-content">
        <div class="pre-logo">
          <img src="/fitnutt-logo.png" alt="Loading Up" />
          <img src="/fitnutt-logo-down.png" alt="Loading Down" />
        </div>
        <h1 class="pre-text">FitNutt</h1>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
